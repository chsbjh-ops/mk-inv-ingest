name: MK Daily Ingest

on:
  schedule:
    - cron: '30 22 * * *'      # 매일 07:30 KST (UTC+9)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: mk-daily-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run MK_INV ingest (시장지표 19종)
        env:
          MK_INV_OUT: data
          MK_INV_LOOKBACK: '7'
        run: python mk_inv_daily_ingest.py

      - name: Run MK_FRED ingest (FRED 12종)
        env:
          MK_FRED_OUT: data
          MK_FRED_START: '2020-01-01'
        run: python mk_fred_daily_ingest.py

      - name: Commit & push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "MK daily update $(date -u +%Y-%m-%d)"
            git pull --rebase --autostash origin main
            git push
          fi

      - name: Upload artifact (백업)
        uses: actions/upload-artifact@v4
        with:
          name: mk_data
          path: data/
          if-no-files-found: warn

